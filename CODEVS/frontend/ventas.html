<!-- frontend/ventas.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPrice Pyme - Ventas</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <a href="index.html">SmartPrice Pyme</a>
        </div>
        <ul class="navbar-menu">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="productos.html">Productos</a></li>
            <li><a href="ventas.html" class="active">Ventas</a></li>
            <li><a href="recomendaciones.html">Recomendaciones</a></li>
            <li><a href="simulacion.html">Simular</a></li>
            <li><a href="#" id="logoutBtn">Cerrar Sesión</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Registrar Venta</h3>
                    </div>
                    
                    <form id="ventaForm">
                        <div class="form-group">
                            <label for="productoSelect">Producto</label>
                            <select class="form-control" id="productoSelect" required>
                                <option value="">Seleccionar producto...</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="cantidad">Cantidad</label>
                            <input type="number" class="form-control" id="cantidad" min="1" value="1" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="metodoPago">Método de Pago</label>
                            <select class="form-control" id="metodoPago">
                                <option value="efectivo">Efectivo</option>
                                <option value="tarjeta">Tarjeta</option>
                                <option value="transferencia">Transferencia</option>
                                <option value="otro">Otro</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="observaciones">Observaciones</label>
                            <textarea class="form-control" id="observaciones" rows="2"></textarea>
                        </div>
                        
                        <button type="submit" class="btn btn-primary">Registrar Venta</button>
                    </form>
                </div>
            </div>
            
            <div class="col">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Resumen del Día</h3>
                    </div>
                    
                    <div id="resumenVentas">
                        <p>Cargando...</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">📋 Historial de Ventas</h3>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-success btn-sm" onclick="exportarExcel()">
                        📊 Exportar a Excel
                    </button>
                    <button class="btn btn-info btn-sm" onclick="exportarCSV()">
                        📄 Exportar a CSV
                    </button>
                </div>
            </div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Precio Unit.</th>
                            <th>Total</th>
                            <th>Método</th>
                            <th>Vendedor</th>
                        </tr>
                    </thead>
                    <tbody id="tablaVentas">
                        <tr><td colspan="7" class="loading">Cargando ventas...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/ventas.js"></script>
</body>
</html>
